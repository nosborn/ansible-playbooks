# yamllint disable rule:line-length
---
- name: create namespace
  kubernetes.core.k8s:
    apply: true
    resource_definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: &namespace synology-csi
    server_side_apply:
      field_manager: ansible

- kubernetes.core.k8s:
    apply: true
    namespace: *namespace
    resource_definition:
      apiVersion: v1
      kind: Secret
      metadata:
        labels:
          app.kubernetes.io/managed-by: Ansible
        name: client-info-secret
      stringData:
        client-info.yml: |
          clients:
            - host: {{ hostvars.diskstation.ansible_facts['default_ipv4'].address }}
              https: true
              password: {{ synology_csi_password }}
              port: 443
              username: {{ synology_csi_username }}
      type: Opaque
    server_side_apply:
      field_manager: ansible

- ansible.builtin.file:
    path: /var/lib/kubelet/plugins_registry
    owner: root
    group: root
    mode: !!str 0755
    state: directory
