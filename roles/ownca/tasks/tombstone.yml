# yamllint disable rule:line-length
---
- name: create tombstone private key
  community.crypto.openssl_privatekey:
    path: "{{ ownca_dir }}/tombstone.key"
    type: ECC
    curve: secp256r1
    mode: !!str 0400

- name: create tombstone CSR
  community.crypto.openssl_csr_pipe:
    common_name: "tombstone.{{ domain_name }}"
    create_subject_key_identifier: true
    extended_key_usage:
      - serverAuth
      - clientAuth
    key_usage:
      - digitalSignature
    key_usage_critical: true
    privatekey_path: "{{ ownca_dir }}/tombstone.key"
    subject_alt_name:
      - "DNS:tombstone.{{ domain_name }}"
      - "IP:{{ hostvars['tombstone'].lan_ipv4_address }}"
      - "IP:{{ hostvars['tombstone'].lan_ipv6_address }}"
  changed_when: false
  register: ownca_tombstone_csr

- name: check whether tombstone certificate exists
  ansible.builtin.stat:
    path: "{{ ownca_dir }}/tombstone.crt"
  register: ownca_tombstone_certificate_file

- name: read existing tombstone certificate
  ansible.builtin.slurp:
    src: "{{ ownca_dir }}/tombstone.crt"
  when: ownca_tombstone_certificate_file.stat.exists
  register: ownca_tombstone_certificate

- name: sign tombstone certificate
  community.crypto.x509_certificate_pipe:
    content: "{{ (ownca_tombstone_certificate.content | b64decode) if ownca_tombstone_certificate_file.stat.exists else omit }}"
    csr_content: "{{ ownca_tombstone_csr.csr }}"
    ownca_path: "{{ ownca_dir }}/root-ca.crt"
    ownca_privatekey_path: "{{ ownca_dir }}/root-ca.key"
    ownca_privatekey_passphrase: "{{ ownca_root_privatekey_passphrase }}"
    ownca_not_after: +398d  # https://support.apple.com/en-us/103769
    ownca_create_authority_key_identifier: true
    provider: ownca
  register: ownca_tombstone_certificate

- name: save tombstone certificate
  ansible.builtin.copy:
    content: "{{ ownca_tombstone_certificate.certificate }}"
    dest: "{{ ownca_dir }}/tombstone.crt"
    mode: !!str 0444
  when: ownca_tombstone_certificate is changed # noqa: no-handler
