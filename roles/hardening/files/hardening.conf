# Module blacklist - reduce kernel attack surface for unprivileged-LPE
# class bugs (Dirty Pipe, Dirty Cred, Copy Fail, Dirty Frag, ...). Modules
# listed here cannot be auto-loaded by unprivileged syscalls.
#
# `install <mod> /bin/false` blocks both manual and on-demand loading.
# Managed by the `hardening` Ansible role; do not edit by hand.

# --- Specific CVE / public-disclosure mitigations ---

# Copy Fail - algif_aead reachable via AF_ALG socket.
install algif_aead /bin/false

# Dirty Frag (Hyunwoo Kim, oss-security 2026-05-08) - chains an IPsec ESP
# bug and an rxrpc bug. Mitigation per the original advisory.
install esp4 /bin/false
install esp6 /bin/false
install rxrpc /bin/false

# --- Rare network protocols (KSPP-style hardening) ---
# None of these are used on the home network. Several have been the source
# of past LPEs (e.g. n-hdlc CVE-2017-2636). Blocking auto-load via
# unprivileged socket(2) calls on obscure address families.

install dccp /bin/false
install sctp /bin/false
install rds /bin/false
install tipc /bin/false
install n-hdlc /bin/false
install ax25 /bin/false
install netrom /bin/false
install x25 /bin/false
install rose /bin/false
install decnet /bin/false
install econet /bin/false
install af_802154 /bin/false
install ipx /bin/false
install appletalk /bin/false
install psnap /bin/false
install p8023 /bin/false
install p8022 /bin/false
install can /bin/false
install atm /bin/false

# --- Rare/legacy filesystems ---
# Historical LPE source via mount(8) of crafted images (or auto-mount on
# removable media). Not used at home.
#
# Intentionally NOT blocked: squashfs (container images), iso9660 (ISO
# images mount via this, not udf), overlay (containers).

install cramfs /bin/false
install freevxfs /bin/false
install jffs2 /bin/false
install hfs /bin/false
install hfsplus /bin/false
install udf /bin/false
