# yamllint disable rule:line-length
---
- name: reload NetworkManager
  ansible.builtin.systemd_service:
    name: NetworkManager.service
    state: reloaded

- name: restart k3s
  ansible.builtin.systemd_service:
    name: "{{ kubernetes_control_plane | ansible.builtin.ternary('k3s-server', 'k3s') }}.service"
    daemon_reload: true
    state: restarted
