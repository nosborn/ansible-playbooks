# yamllint disable rule:line-length
---
- name: "k3s : fetch release info"
  delegate_to: localhost
  ansible.builtin.uri:
    url: https://api.github.com/repos/k3s-io/k3s/releases/latest
    headers:
      Accept: application/vnd.github+json
    return_content: true
    body_format: json
  register: kubernetes_k3s_result
  until: kubernetes_k3s_result is success

- name: "k3s : set version fact"
  ansible.builtin.set_fact:
    k3s_version: "{{ kubernetes_k3s_result.json.tag_name }}"

- name: "k3s : install binary"
  ansible.builtin.get_url:
    url: "{{ kubernetes_k3s_result.json.assets | selectattr('name', 'eq', 'k3s') | map(attribute='browser_download_url') | first }}"
    checksum: "{{ kubernetes_k3s_result.json.assets | selectattr('name', 'eq', 'k3s') | map(attribute='digest') | first }}"
    dest: /usr/local/bin/k3s
    owner: root
    group: root
    mode: !!str 0555
  notify: restart k3s

- name: "k3s : link binary"
  ansible.builtin.file:
    src: k3s
    dest: /usr/local/bin/{{ kubernetes_k3s_item }}
    state: link
  loop:
    - crictl
    - ctr
    - kubectl
  loop_control:
    loop_var: kubernetes_k3s_item

- ansible.posix.sysctl:
    sysctl_file: /etc/sysctl.d/90-kubelet.conf
    name: "{{ kubernetes_k3s_item.name }}"
    value: "{{ kubernetes_k3s_item.value }}"
    sysctl_set: true
  loop:
    - name: vm.panic_on_oom
      value: 0
    - name: vm.overcommit_memory
      value: 1
    - name: kernel.panic
      value: 10
    - name: kernel.panic_on_oops
      value: 1
  loop_control:
    loop_var: kubernetes_k3s_item

- name: "k3s : create config dir"
  ansible.builtin.file:
    path: "{{ kubernetes_k3s_item }}"
    owner: root
    group: root
    mode: !!str 0755
    state: directory
  loop:
    - /etc/rancher
    - /etc/rancher/k3s
  loop_control:
    loop_var: kubernetes_k3s_item

- name: "k3s : configure"
  ansible.builtin.template:
    src: "{{ kubernetes_control_plane | ansible.builtin.ternary('k3s-server', 'k3s') }}.yaml.j2"
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: !!str 0400
  notify: restart k3s

- name: "k3s : install service"
  ansible.builtin.template:
    src: "{{ kubernetes_control_plane | ansible.builtin.ternary('k3s-server', 'k3s') }}.service.j2"
    dest: /etc/systemd/system/{{ kubernetes_control_plane | ansible.builtin.ternary('k3s-server', 'k3s') }}.service
    owner: root
    group: root
    mode: !!str 0444
  notify: restart k3s

- name: "k3s : enable and start service"
  ansible.builtin.systemd_service:
    name: "{{ kubernetes_control_plane | ansible.builtin.ternary('k3s-server', 'k3s') }}.service"
    daemon_reload: true
    enabled: true
    state: started

- name: "k3s : install shutdown service"
  ansible.builtin.template:
    src: k3s-shutdown.service.j2
    dest: /etc/systemd/system/k3s-shutdown.service
    owner: root
    group: root
    mode: !!str 0444
  notify: restart k3s # to get daemon reloaded

- name: "k3s : enable shutdown service"
  ansible.builtin.systemd_service:
    name: k3s-shutdown.service
    daemon_reload: true
    enabled: true

- ansible.builtin.meta: flush_handlers
  when: kubernetes_control_plane

- name: "k3s : wait for control plane ready"
  ansible.builtin.wait_for:
    host: "{{ lan_ipv4_address }}"
    port: 6443
  when: kubernetes_control_plane
