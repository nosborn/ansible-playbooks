---
- name: install package
  ansible.builtin.package:
    name:
      - nginx-full
      - libnginx-mod-stream
    state: present
  register: stream_proxy_result
  until: stream_proxy_result is not failed

- name: configure
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: !!str 0444
    validate: nginx -t %s
  notify: restart nginx

- name: enable and start service
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started
