# yamllint disable rule:line-length
---
- name: create user group
  ansible.builtin.group:
    name: beszel
    system: true

- name: create user
  ansible.builtin.user:
    name: beszel
    comment: Beszel
    create_home: false
    group: beszel
    groups:
      - disk
    home: /var/lib/beszel
    password_lock: true
    shell: "{{ nologin_shell }}"
    system: true

- name: create directory
  ansible.builtin.file:
    path: /var/lib/beszel
    owner: beszel
    group: beszel
    mode: !!str 0700
    state: directory

- name: fetch release info
  delegate_to: localhost
  ansible.builtin.uri:
    url: https://api.github.com/repos/henrygd/beszel/releases/latest
    headers:
      Accept: application/vnd.github+json
    return_content: true
    body_format: json
  register: beszel_release
  until: beszel_release is success

- ansible.builtin.import_tasks: hub.yml
  vars:
    beszel_release: "{{ beszel_release }}"
  when: beszel_hub

- ansible.builtin.import_tasks: agent.yml
  vars:
    beszel_release: "{{ beszel_release }}"
