# yamllint disable rule:line-length
---
- ansible.builtin.package:
    name: smartmontools
    state: present

- ansible.builtin.tempfile:
    state: directory
  register: beszel_agent_tempfile
  changed_when: false

- ansible.builtin.unarchive:
    src: "{{ beszel_release.json.assets | selectattr('name', 'equalto', 'beszel-agent_linux_amd64.tar.gz') | map(attribute='browser_download_url') | first }}"
    remote_src: true
    dest: "{{ beszel_agent_tempfile.path }}"
    owner: root
    group: root
  changed_when: false

- name: "agent: install binary"
  ansible.builtin.copy:
    src: "{{ beszel_agent_tempfile.path }}/beszel-agent"
    remote_src: true
    dest: /usr/local/bin/beszel-agent
    owner: root
    group: root
    mode: !!str 0555
  notify: restart beszel-agent

- name: "agent : create service unit"
  ansible.builtin.template:
    src: beszel-agent.service.j2
    dest: /etc/systemd/system/beszel-agent.service
    owner: root
    group: root
    mode: !!str 0444
    validate: systemd-analyze verify %s
  notify: restart beszel-agent

- name: "agent : enable and start service"
  ansible.builtin.systemd_service:
    name: beszel-agent.service
    daemon_reload: true
    enabled: true
    state: started

